<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Emotion Detection</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🎭 Live Emotion Detection</h1>

    <div class="video-container">
      <video id="video" autoplay muted></video>
      <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <div class="buttons">
      <button id="startBtn" class="btn">Start Detection</button>
      <button id="stopBtn" class="btn stop">Stop Detection</button>
    </div>

    <div id="results" class="results-card">
      <h2>Emotion Scores</h2>
      <div id="emotions" class="emotions-bars"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
